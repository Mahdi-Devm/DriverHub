version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: driverhub-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - driverhub-network
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    container_name: driverhub-redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - driverhub-network
    env_file:
      - .env

volumes:
  postgres_data:
  redis_data:

networks:
  driverhub-network:
    driver: bridge
